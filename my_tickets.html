<!DOCTYPE html>
<html>
<head>
<title>My Tickets</title>

<style>
body{
    font-family:Arial;
    background:#f0f2f5;
    margin:0;
}

.navbar{
    background:#111;
    color:white;
    padding:15px;
}

.navbar a{
    color:white;
    margin-right:15px;
    text-decoration:none;
}

.container{
    text-align:center;
    margin-top:30px;
}

.ticket{
    background:white;
    width:450px;
    margin:15px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:left;
}

.high{ color:red; font-weight:bold; }
.medium{ color:orange; font-weight:bold; }
.low{ color:green; font-weight:bold; }

.status{
    font-weight:bold;
}

.responseBox{
    margin-top:12px;
    padding:12px;
    background:#e8f8ee;
    border-left:5px solid green;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="navbar">
    Support Ticket System

    <span style="float:right">
        <a href="/dashboard/">Dashboard</a>
        <a href="/create-ticket/">Create Ticket</a>
        <a href="/" onclick="logout()">Logout</a>
    </span>
</div>

<div class="container">
    <h2 id="pageTitle">My Tickets</h2>
    <div id="tickets"></div>
</div>

<script>

// login check
if(!localStorage.getItem("token")){
    window.location="/";
}

function logout(){
    localStorage.removeItem("token");
}

const token = localStorage.getItem("token");

// read filter from url
const params = new URLSearchParams(window.location.search);
const filter = params.get("filter");

// Change title dynamically
if(filter === "OPEN")
    document.getElementById("pageTitle").innerText="Open Tickets";
else if(filter === "RESOLVED")
    document.getElementById("pageTitle").innerText="Resolved Tickets";
else if(filter === "HIGH")
    document.getElementById("pageTitle").innerText="High Priority Tickets";


// fetch tickets 
fetch("/api/tickets/",{
    headers:{
        "Authorization":"Bearer "+token
    }
})
.then(res=>res.json())
.then(data=>{

    const container = document.getElementById("tickets");
    container.innerHTML = "";

    // ===== Dashboard filter connection =====
    if(filter){
        if(filter === "HIGH"){
            data = data.filter(t => t.priority === "HIGH");
        }else{
            data = data.filter(t => t.status === filter);
        }
    }

    if(data.length === 0){
        container.innerHTML="<p>No tickets found.</p>";
        return;
    }

    data.forEach(ticket=>{

        let priorityClass =
            ticket.priority==="HIGH" ? "high" :
            ticket.priority==="MEDIUM" ? "medium" : "low";

        container.innerHTML += `
            <div class="ticket">

                <h3>${ticket.title}</h3>

                <p>${ticket.description}</p>

                <p class="status">
                    Status: ${ticket.status}
                </p>

                <p class="${priorityClass}">
                    Priority: ${ticket.priority}
                </p>

                ${
                    ticket.admin_response
                    ? `<div class="responseBox">
                        <b>✅ Admin Solution:</b><br>
                        ${ticket.admin_response}
                      </div>`
                    : ""
                }

            </div>
        `;
    });
})
.catch(err => console.log(err));

</script>

</body>
</html>
